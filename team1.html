<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Family Feud — Team 1</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --team: #f59e0b;
        }

        body {
            background: #0f172a;
        }

        .ans-revealed {
            background: linear-gradient(135deg, #92400e, #d97706);
            border-color: #f59e0b;
        }

        .flip-in {
            animation: flip 0.5s ease-out;
        }

        @keyframes flip {
            0% {
                transform: scaleY(0);
            }

            100% {
                transform: scaleY(1);
            }
        }

        .pulse {
            animation: pulse 1.5s ease-in-out infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
                transform: scale(1);
            }

            50% {
                opacity: .85;
                transform: scale(1.02);
            }
        }

        .buzz-btn {
            width: 220px;
            height: 220px;
            border-radius: 50%;
            background: radial-gradient(circle at 35% 30%, #f87171, #dc2626 50%, #991b1b);
            box-shadow:
                0 0 0 12px #7f1d1d,
                0 16px 0 12px #3b0000,
                0 16px 40px 12px rgba(0, 0, 0, 0.65),
                inset 0 -8px 14px rgba(0, 0, 0, 0.35),
                inset 0 8px 14px rgba(255, 255, 255, 0.22);
            color: white;
            font-weight: 900;
            font-size: 2.4rem;
            letter-spacing: 0.12em;
            cursor: pointer;
            transition: transform 0.08s ease, box-shadow 0.08s ease;
            border: none;
            outline: none;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        .buzz-btn:active {
            transform: translateY(10px);
            box-shadow:
                0 0 0 12px #7f1d1d,
                0 6px 0 12px #3b0000,
                0 6px 20px 12px rgba(0, 0, 0, 0.5),
                inset 0 -4px 8px rgba(0, 0, 0, 0.35),
                inset 0 4px 8px rgba(255, 255, 255, 0.12);
        }

        .buzz-btn-buzzed {
            width: 220px;
            height: 220px;
            border-radius: 50%;
            background: radial-gradient(circle at 35% 30%, #6b7280, #4b5563 50%, #374151);
            box-shadow:
                0 0 0 12px #374151,
                0 6px 0 12px #111827,
                0 6px 20px 12px rgba(0, 0, 0, 0.4),
                inset 0 -4px 8px rgba(0, 0, 0, 0.3);
            color: #9ca3af;
            font-weight: 900;
            font-size: 2.4rem;
            letter-spacing: 0.12em;
            cursor: not-allowed;
            border: none;
            outline: none;
            transform: translateY(10px);
        }
    </style>
</head>

<body class="min-h-screen flex flex-col text-gray-100">

    <!-- Header -->
    <header
        class="bg-gradient-to-r from-yellow-700 to-yellow-600 shadow-lg px-4 py-3 flex items-center justify-between">
        <div>
            <h1 id="teamName" class="text-2xl font-black text-white tracking-tight">Team 1</h1>
            <span id="phaseChip"
                class="inline-block text-xs font-bold px-2 py-0.5 rounded-full bg-yellow-900 text-yellow-200 uppercase tracking-wider mt-0.5">IDLE</span>
        </div>
        <div class="text-right">
            <p class="text-yellow-200 text-xs">Round</p>
            <p id="roundNum" class="text-3xl font-black text-white leading-none">1</p>
        </div>
    </header>

    <!-- Scores -->
    <div class="grid grid-cols-2 gap-3 px-4 pt-4">
        <div id="myScoreCard" class="bg-yellow-600 rounded-xl p-4 text-center border-2 border-yellow-400">
            <p id="myLabel" class="text-yellow-100 text-xs font-semibold uppercase">Team 1</p>
            <p id="myScore" class="text-5xl font-black text-white">0</p>
            <p class="text-yellow-200 text-xs">MY SCORE</p>
        </div>
        <div class="bg-gray-700 rounded-xl p-4 text-center border-2 border-gray-600">
            <p id="oppLabel" class="text-gray-300 text-xs font-semibold uppercase">Team 2</p>
            <p id="oppScore" class="text-5xl font-black text-white">0</p>
            <p class="text-gray-400 text-xs">OPPONENT</p>
        </div>
    </div>

    <!-- Buzzer (shown during face-off before anyone buzzes) -->
    <div id="buzzerSection" class="hidden px-4 pt-6 pb-2">
        <div class="flex justify-center">
            <button id="btnBuzz" class="buzz-btn">BUZZ!</button>
        </div>
    </div>

    <!-- Buzzer result (shown once someone has buzzed) -->
    <div id="buzzerResult" class="hidden px-4 pt-4"></div>

    <!-- Play or Pass (shown when this team won the face-off) -->
    <div id="playPassSection" class="hidden px-4 pt-4">
        <p class="text-center text-xs text-yellow-400 font-bold uppercase tracking-widest mb-3">You won the face-off —
            Play or Pass?</p>
        <div class="grid grid-cols-2 gap-3">
            <button id="btnPlay"
                class="bg-green-600 hover:bg-green-500 active:bg-green-700 text-white font-black text-2xl py-10 rounded-2xl shadow-lg transition-colors">
                PLAY
            </button>
            <button id="btnPass"
                class="bg-gray-600 hover:bg-gray-500 active:bg-gray-700 text-white font-black text-2xl py-10 rounded-2xl shadow-lg transition-colors">
                PASS
            </button>
        </div>
    </div>

    <!-- Status Banner -->
    <div class="px-4 pt-3">
        <div id="statusBanner" class="hidden rounded-xl p-3 text-center border-2 border-green-500 bg-green-900 pulse">
            <p class="text-white font-black text-lg">YOUR TURN!</p>
        </div>
        <div id="waitBanner" class="hidden rounded-xl p-3 text-center border-2 border-gray-600 bg-gray-800 mt-4">
            <p class="text-gray-400 font-semibold" id="waitText">Waiting...</p>
        </div>
    </div>

    <!-- Strikes -->
    <div class="flex items-center justify-center gap-3 pt-4">
        <span id="s0"
            class="w-12 h-12 rounded-full border-2 border-gray-700 flex items-center justify-center text-2xl font-black text-gray-700 transition-all">✗</span>
        <span id="s1"
            class="w-12 h-12 rounded-full border-2 border-gray-700 flex items-center justify-center text-2xl font-black text-gray-700 transition-all">✗</span>
        <span id="s2"
            class="w-12 h-12 rounded-full border-2 border-gray-700 flex items-center justify-center text-2xl font-black text-gray-700 transition-all">✗</span>
        <span class="text-gray-500 text-sm ml-2">STRIKES</span>
    </div>

    <!-- Question -->
    <div class="mx-4 mt-4 bg-gray-800 rounded-xl p-4 border border-gray-700">
        <p class="text-gray-400 text-xs uppercase tracking-wider mb-1">Question</p>
        <p id="questionText" class="text-white font-bold text-lg leading-snug italic">Waiting for question...</p>
    </div>

    <!-- Answer Board -->
    <div id="answersBoard" class="grid grid-cols-1 sm:grid-cols-2 gap-2 mx-4 mt-3">
        <!-- populated dynamically -->
    </div>

    <!-- Round Points -->
    <div class="mx-4 mt-3 mb-4 bg-gray-800 rounded-xl p-3 flex items-center justify-between border border-gray-700">
        <span class="text-gray-400 text-sm">Round Points</span>
        <span id="roundPoints" class="text-3xl font-black text-yellow-400">0</span>
    </div>

    <script type="module">
        import { initDB, loadState, subscribe, broadcastAction, PHASES } from './game.js';

        const buzzSound = new Audio("sounds/buzzer-or-wrong-answer.mp3");
        const correctSound = new Audio("sounds/correct-answer.mp3");

        function playSound(sound) {
            sound.pause();

            if (sound === buzzSound) {
                sound.currentTime = 0.25; // skip first 250 ms
            } else {
                sound.currentTime = 0;
            }

            sound.play();
        }

        const TEAM = 'team1';
        let state = loadState();

        async function init() {
            subscribe(newState => { state = newState; render(); });
            document.getElementById('btnBuzz').addEventListener('click', () => {
                playSound(buzzSound);
                broadcastAction({ type: 'BUZZ', team: TEAM });
                const btn = document.getElementById('btnBuzz');
                btn.disabled = true;
                btn.textContent = 'Buzzed!';
                btn.className = 'buzz-btn-buzzed';
            });
            document.getElementById('btnPlay').addEventListener('click', () => {
                playSound(correctSound);
                broadcastAction({ type: 'PLAY_OR_PASS', choice: 'play' });
                document.getElementById('playPassSection').classList.add('hidden');
            });
            document.getElementById('btnPass').addEventListener('click', () => {
                playSound(correctSound);
                broadcastAction({ type: 'PLAY_OR_PASS', choice: 'pass' });
                document.getElementById('playPassSection').classList.add('hidden');
            });
            render();
            try { await initDB(); } catch (e) { console.warn('SheetDB unavailable', e); }
        }

        const PHASE_STYLE = {
            IDLE: 'bg-gray-700 text-gray-300',
            FACE_OFF: 'bg-orange-600 text-white',
            FACE_OFF_ANSWER: 'bg-orange-500 text-white',
            PLAY: 'bg-green-700 text-white',
            STEAL: 'bg-purple-700 text-white',
            ROUND_COMPLETE: 'bg-blue-700 text-white',
            GAME_OVER: 'bg-yellow-500 text-gray-900',
        };

        function isMyTurn() {
            return state.currentTeam === TEAM &&
                (state.phase === PHASES.PLAY || state.phase === PHASES.STEAL || state.phase === PHASES.FACE_OFF_ANSWER);
        }

        function render() {
            const myName = state.teamNames[TEAM] || 'Team 1';
            const oppName = state.teamNames['team2'] || 'Team 2';

            document.getElementById('teamName').textContent = myName;
            document.getElementById('myLabel').textContent = myName;
            document.getElementById('oppLabel').textContent = oppName;
            document.getElementById('roundNum').textContent = state.round;
            document.getElementById('myScore').textContent = state.scores[TEAM] || 0;
            document.getElementById('oppScore').textContent = state.scores['team2'] || 0;
            document.getElementById('roundPoints').textContent = state.roundPoints || 0;

            // Phase chip
            const chip = document.getElementById('phaseChip');
            chip.textContent = state.phase;
            chip.className = `inline-block text-xs font-bold px-2 py-0.5 rounded-full uppercase tracking-wider mt-0.5 ${PHASE_STYLE[state.phase] || 'bg-gray-700 text-gray-300'}`;

            // Strikes
            for (let i = 0; i < 3; i++) {
                const el = document.getElementById(`s${i}`);
                if (i < state.strikes) {
                    el.className = 'w-12 h-12 rounded-full border-2 border-red-500 bg-red-700 flex items-center justify-center text-2xl font-black text-white transition-all';
                } else {
                    el.className = 'w-12 h-12 rounded-full border-2 border-gray-700 flex items-center justify-center text-2xl font-black text-gray-700 transition-all';
                }
            }

            // Status banners
            const statusEl = document.getElementById('statusBanner');
            const waitEl = document.getElementById('waitBanner');
            const waitText = document.getElementById('waitText');

            if (state.phase === PHASES.IDLE || state.phase === PHASES.ROUND_COMPLETE || state.phase === PHASES.GAME_OVER) {
                statusEl.classList.add('hidden');
                waitEl.classList.add('hidden');
            } else if (isMyTurn()) {
                statusEl.classList.remove('hidden');
                waitEl.classList.add('hidden');
            } else {
                statusEl.classList.add('hidden');
                waitEl.classList.remove('hidden');
                if (state.phase === PHASES.FACE_OFF) {
                    waitText.textContent = 'Face-off in progress...';
                } else if (state.currentTeam) {
                    waitText.textContent = `${state.teamNames[state.currentTeam] || state.currentTeam}'s turn`;
                } else {
                    waitText.textContent = 'Waiting...';
                }
            }

            // Play or Pass
            const playPassSection = document.getElementById('playPassSection');
            if (state.phase === PHASES.FACE_OFF_ANSWER && state.faceOffWinner === TEAM) {
                playPassSection.classList.remove('hidden');
            } else {
                playPassSection.classList.add('hidden');
            }

            // Buzzer
            const buzzerSection = document.getElementById('buzzerSection');
            const btnBuzz = document.getElementById('btnBuzz');
            if (state.phase === PHASES.FACE_OFF && !state.faceOffFirstTeam) {
                buzzerSection.classList.remove('hidden');
                btnBuzz.disabled = false;
                btnBuzz.textContent = 'BUZZ!';
                btnBuzz.className = 'buzz-btn';
            } else {
                buzzerSection.classList.add('hidden');
            }

            // Buzzer result
            const buzzerResult = document.getElementById('buzzerResult');
            if (state.faceOffFirstTeam && (state.phase === PHASES.FACE_OFF || state.phase === PHASES.FACE_OFF_ANSWER)) {
                const isMe = state.faceOffFirstTeam === TEAM;
                const name = state.teamNames[state.faceOffFirstTeam] || state.faceOffFirstTeam;
                buzzerResult.className = 'px-4 pt-4';
                buzzerResult.innerHTML = `
                    <div class="rounded-2xl p-4 text-center border-2 ${isMe ? 'bg-green-900 border-green-500' : 'bg-orange-950 border-orange-700'}">
                        <p class="text-xs uppercase tracking-widest font-bold mb-1 ${isMe ? 'text-green-400' : 'text-orange-400'}">
                            ${isMe ? '⚡ You Buzzed First!' : '🔔 Buzzed First'}
                        </p>
                        <p class="text-3xl font-black ${isMe ? 'text-green-200' : 'text-white'}">${name}</p>
                    </div>`;
            } else {
                buzzerResult.className = 'hidden';
                buzzerResult.innerHTML = '';
            }

            // Question
            document.getElementById('questionText').textContent =
                state.currentQuestion ? state.currentQuestion.question : 'Waiting for question...';

            // Answer board
            renderAnswers();

            // Game over overlay
            if (state.phase === PHASES.GAME_OVER && !document.getElementById('goOverlay')) {
                const div = document.createElement('div');
                div.id = 'goOverlay';
                div.className = 'fixed inset-0 z-50 flex items-center justify-center bg-black bg-opacity-90';
                const isWin = state.winner === TEAM;
                div.innerHTML = `
                    <div class="text-center p-8">
                        <div class="text-8xl mb-4">${isWin ? '🏆' : (state.winner ? '😔' : '🤝')}</div>
                        <h2 class="text-4xl font-black mb-2 ${isWin ? 'text-yellow-400' : 'text-gray-400'}">
                            ${isWin ? 'YOU WIN!' : (state.winner ? 'You Lose.' : "It's a Tie!")}
                        </h2>
                        <p class="text-white text-xl mb-6">${myName}: ${state.scores[TEAM]} pts</p>
                        <button onclick="document.getElementById('goOverlay').remove()"
                            class="bg-yellow-500 text-gray-900 font-bold px-8 py-3 rounded-full text-lg">Close</button>
                    </div>`;
                document.body.appendChild(div);
            }
        }

        function renderAnswers() {
            const board = document.getElementById('answersBoard');
            const q = state.currentQuestion;
            if (!q || !q.answers || !q.answers.length) { board.innerHTML = ''; return; }

            q.answers.forEach((ans, idx) => {
                let card = board.querySelector(`[data-idx="${idx}"]`);
                if (!card) {
                    card = document.createElement('div');
                    card.dataset.idx = idx;
                    board.appendChild(card);
                }
                const wasRevealed = card.dataset.revealed === 'true';
                card.dataset.revealed = ans.revealed;
                card.className = `rounded-xl p-3 border-2 text-sm font-bold flex items-center justify-between transition-colors ${ans.revealed ? 'ans-revealed text-white border-yellow-600' : 'bg-gray-800 text-gray-500 border-gray-700'}`;
                if (ans.revealed) {
                    if (!wasRevealed) card.classList.add('flip-in');
                    card.innerHTML = `<span>${idx + 1}. ${ans.text}</span><span class="text-yellow-200 font-black text-lg">${ans.points}</span>`;
                } else {
                    card.innerHTML = `<span class="text-gray-600 font-black text-xl w-full text-center">${idx + 1}</span>`;
                }
            });

            // Remove stale cards
            board.querySelectorAll('[data-idx]').forEach(el => {
                if (parseInt(el.dataset.idx) >= q.answers.length) el.remove();
            });
        }

        init();
    </script>
</body>

</html>
